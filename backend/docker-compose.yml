version: "3.9"

services:
  backend-despacho:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    container_name: innovatechv1-backend-despacho
    restart: always
    ports:
      - "8081:8081"
    environment:
      DB_IP_PRIVADA: ${DB_IP_PRIVADA}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME_DESPACHO}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

  backend-ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
      dockerfile: Dockerfile
    container_name: innovatechv1-backend-ventas
    restart: always
    ports:
      - "8082:8082"
    environment:
      DB_IP_PRIVADA: ${DB_IP_PRIVADA}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME_VENTAS}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
