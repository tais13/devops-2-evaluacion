name: CI/CD Innovatech - Backend Ventas

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/back-Ventas_SpringBoot/Springboot-API-REST/**"

jobs:
  build-push-deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Java 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Spring Boot
      run: |
        cd backend/back-Ventas_SpringBoot/Springboot-API-REST
        sed -i 's/\r$//' mvnw
        chmod +x mvnw
        ./mvnw clean package -DskipTests

    - name: Build imagen Backend Ventas
      run: |
        cd backend/back-Ventas_SpringBoot/Springboot-API-REST
        docker build -t innovatechv1-backend-ventas .

    - name: Tag imagen Backend Ventas
      run: |
        docker tag innovatechv1-backend-ventas:latest ${{ secrets.ECR_REPO_URL_BACKEND_VENTAS }}:latest

    - name: Push imagen Backend Ventas
      run: |
        docker push ${{ secrets.ECR_REPO_URL_BACKEND_VENTAS }}:latest

    - name: Deploy Backend Ventas vía SSM
      run: |
        aws ssm send-command \
          --instance-ids "${{ secrets.EC2_BACKEND_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy innovatechv1-backend-ventas" \
          --parameters '{
            "commands":[
              "set -e",
              "aws ecr get-login-password --region '${{ secrets.AWS_REGION }}' | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REPO_URL_BACKEND_VENTAS }}:latest",
              "docker stop innovatechv1-backend-ventas || true",
              "docker rm innovatechv1-backend-ventas || true",
              "docker run -d --name innovatechv1-backend-ventas --restart always -p 8082:8082 -e DB_IP_PRIVADA=${{secrets.DB_IP_PRIVADA}} -e DB_PORT=${{ secrets.DB_PORT }} -e DB_NAME=${{ secrets.DB_NAME_VENTAS }} -e DB_USERNAME=${{ secrets.DB_USERNAME }} -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} ${{ secrets.ECR_REPO_URL_BACKEND_VENTAS }}:latest"
            ]
          }' \
          --output text